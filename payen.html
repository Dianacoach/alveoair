<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | AlveoAir Respiratory Coaching</title>

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Lato', sans-serif;

    /* SAME AS INDEX */
    background: #eef5f1;

    color: #1f2a24;
}

/* MAIN WRAPPER */
.container {
    padding: 60px 20px;
    text-align: center;
    min-height: 100vh;
}

/* TITLE */
h1 {
    margin-bottom: 30px;
}

/* INFO TEXT */
.info-text {
    max-width: 700px;
    margin: 0 auto 30px;
    line-height: 1.6;
}

/* PAYMENT CARDS */
.payment-bar {
    background: #e6f2ea; /* soft green card */
    margin: 15px auto;
    padding: 18px;
    width: 90%;
    max-width: 500px;
    border-radius: 16px;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;

    box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    border: 1px solid rgba(0,0,0,0.06);

    transition: 0.25s ease;
}

.payment-bar:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 22px rgba(0,0,0,0.15);
}

/* ICONS */
.payment-bar img {
    width: 55px;
}

/* LINKS */
.payment-bar a {
    text-decoration: none;
    color: #2e5f4d;
    font-weight: 600;
    font-size: 1.1em;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* HELP */
.help-section {
    margin-top: 50px;
}

.help-icon {
    width: 55px;
}

/* NAV BUTTONS */
.bottom-links img {
    width: 50px;
    margin: 10px;
    transition: 0.2s;
}

.bottom-links img:hover {
    transform: scale(1.08);
}

</style>
</head>

<body>

<div class="container">

<h1>Secure Payment</h1>

<div class="info-text">
    <p><strong>Zelle:</strong> Use your U.S. bank app → Select “Send/Transfer” → Choose Zelle.</p>
    <p><strong>Wise:</strong> Download Wise (recommended) to send or receive international payments quickly and securely.</p>
</div>

<!-- PAYMENT OPTIONS -->
<div class="payment-bar">

   <a href="paypalqr.png" target="_blank">
        <img src="paypal.png" alt="PayPal payment">
        Pay with PayPal
    </a>

    <a href="wiseqr.png" target="_blank">
        <img src="wise.png" alt="Wise payment">
        Pay with Wise
    </a>

</div>


<p> <a href="mailto:alveoair@gmail.com?subject=Help Request">
        <img src="help.png" class="help-icon" alt="Help"></p>
<p> <a href="en.html"><img src="home.png" alt="Home"></a></p>
    <BR><BR>
</body>
</html>
